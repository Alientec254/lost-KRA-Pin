<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lost KRA Pin Application</title>

<style>
body { 
  font-family:'Segoe UI',sans-serif; 
  background:#f3f7f6; 
  padding:20px; 
  margin:0;
}
.container { 
  max-width:1000px; 
  margin:auto; 
  background:#fff; 
  border-radius:20px; 
  padding:35px; 
  box-shadow:0 8px 30px rgba(0,0,0,0.08); 
  border-top:5px solid #10b981; 
}

.header { text-align:center; margin-bottom:30px; }
.icon { 
  width:65px; height:65px; background:#10b981; border-radius:50%; 
  display:flex; align-items:center; justify-content:center; margin:auto; 
  color:white; font-size:26px; 
}
h1 { color:#059669; margin-top:15px; }
.sub { color:#6b7280; font-size:14px; }

.grid { display:grid; grid-template-columns:repeat(3,1fr); gap:18px; }
@media(max-width:768px){ .grid{grid-template-columns:1fr;} }

.field { display:flex; flex-direction:column; }
label { font-size:13px; font-weight:600; margin-bottom:6px; }

input, select { 
  padding:14px; border-radius:10px; border:1px solid #d1d5db; outline:none; 
}

button { 
  margin-top:25px; width:100%; padding:15px; background:#10b981; color:white; 
  border:none; border-radius:10px; font-size:16px; cursor:pointer; 
}
button:hover { background:#059669; }
button:disabled { background:#9ca3af; }

.screen { display:none; }
.active { display:block; }

#status { margin-top:15px; text-align:center; font-weight:bold; }

/* Spinner */
.spinner { 
  display:none; width:50px; height:50px; border:5px solid #f3f3f3; 
  border-top:5px solid #10b981; border-radius:50%; animation:spin 1s linear infinite; 
  margin:20px auto; 
}
@keyframes spin { 100% { transform:rotate(360deg); } }

.mpesa-logo { width:100px; margin:20px auto; display:block; }

/* Consent */
.consent { margin-top:20px; }
.checkbox-wrapper{
  display:flex; gap:10px; font-size:14px; color:#374151;
}
.checkbox-wrapper input{
  width:18px; height:18px; accent-color:#10b981;
}
.checkbox-wrapper a{
  color:#10b981; text-decoration:none; font-weight:600;
}

/* Success Modal */
.success-modal {
  position: fixed;
  top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  align-items:center;
  justify-content:center;
}

.success-content {
  background:white;
  padding:40px;
  border-radius:20px;
  text-align:center;
  max-width:420px;
}
</style>
</head>

<body>

<div class="container">

<!-- FORM -->
<div id="formScreen" class="screen active">
  <div class="header">
    <div class="icon">👤</div>
    <h1>Lost KRA Pin Application</h1>
    <div class="sub">Fill required details</div>
  </div>

  <form id="form">
    <div class="grid">
      <div class="field">
        <label>Full Names *</label>
        <input name="Full Names" required>
      </div>

      <div class="field">
        <label>ID Number *</label>
        <input name="ID Number" required>
      </div>

      <div class="field">
        <label>Phone Number *</label>
        <input name="Phone Number" required>
      </div>

      <div class="field">
        <label>Delivery Method *</label>
        <select name="Preferred Delivery Method" required>
          <option value="">Select</option>
          <option>WhatsApp</option>
          <option>Email</option>
        </select>
      </div>
    </div>

    <!-- CONSENT -->
    <div class="consent">
      <label class="checkbox-wrapper">
        <input type="checkbox" id="consent" required>
        <span>
          I confirm that I have read, understood, and agree to the 
          <a href="https://www.onlinecyber.co.ke/data-protection" target="_blank">
            Data Protection & Privacy Policy
          </a> and consent to the processing of my data.
        </span>
      </label>
    </div>

    <button type="submit">Proceed to Payment</button>
  </form>
</div>

<!-- PAYMENT (RESTORED ORIGINAL DESIGN) -->
<div id="paymentScreen" class="screen">

  <div class="header">
    <div class="icon">💳</div>
    <h1>Complete Payment</h1>
    <div class="sub">Enter your M-PESA number</div>
  </div>

  <div class="field">
    <label>M-PESA Number *</label>
    <input id="mpesa" placeholder="07XXXXXXXX" maxlength="10">
  </div>

  <img src="https://upload.wikimedia.org/wikipedia/commons/1/15/M-PESA_LOGO-01.svg" 
       class="mpesa-logo">

  <div id="spinner" class="spinner"></div>

  <button id="payButton" onclick="payNow()">Pay Now - KES 200</button>

  <div id="status"></div>

</div>

</div>

<!-- SUCCESS MODAL -->
<div id="successModal" class="success-modal">
  <div class="success-content">
    <h2>✅ Application Submitted</h2>
    <p>Check your phone and enter your M-PESA PIN.</p>
    <button onclick="location.reload()">Done</button>
  </div>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbxukDLNV_aKGSdLaZVGhA6epqE8h7OLPNfCUQDMnJb6I7Lk49Ks3zIeiWJEyrDORF38hg/exec";

let formDataStore = {};

// FORM
document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  if(!document.getElementById("consent").checked){
    alert("Please agree to the policy.");
    return;
  }

  formDataStore = Object.fromEntries(new FormData(this).entries());

  document.getElementById("formScreen").classList.remove("active");
  document.getElementById("paymentScreen").classList.add("active");
});

// PAYMENT
async function payNow(){

  let phone = document.getElementById("mpesa").value.trim();
  const status = document.getElementById("status");
  const spinner = document.getElementById("spinner");
  const btn = document.getElementById("payButton");

  if(!phone){
    status.innerText="Enter M-PESA number";
    return;
  }

  if(phone.startsWith("07")){
    phone = "254" + phone.substring(1);
  }

  spinner.style.display="block";
  btn.disabled = true;
  status.innerText="⏳ Sending STK Push...";

  try{

    const res = await fetch(scriptURL,{
      method:"POST",
      headers:{ "Content-Type":"application/x-www-form-urlencoded" },
      body:new URLSearchParams({
        ...formDataStore,
        "M-PESA Number":phone,
        "Phone Number":phone,
        amount:"1"
      })
    });

    const text = await res.text();
    let result = {};
    try { result = JSON.parse(text); } catch(e){}

    if(result.status==="success"){
      document.getElementById("successModal").style.display="flex";
    } else {
      status.innerText="❌ " + (result.message || "Failed");
    }

  }catch(err){
    status.innerText="❌ Network error";
  }

  spinner.style.display="none";
  btn.disabled = false;
}
</script>

</body>
</html>
